<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A25</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            justify-content: center;display: flex;
            align-items: center;
            height: 100vh;
        }
        .container {
            width: 400px;
            height: 400px;
            position: relative;
            border-radius: 50%;
            overflow: hidden;
        }
        .container::after {
            position: absolute;
            content: "";
            inset: 0;
            background: conic-gradient(red 0% 45%, blue 45% 70%, green 70% 100%);
        }

        .container::before {
            position: absolute;
            content: "";
            inset: 0;
          mask: conic-gradient(black 0deg, transparent 0deg);
    -webkit-mask: conic-gradient(black 0deg, transparent 0deg);
            transform-origin: center;
            z-index: 2;
            transform: rotate(360deg);
             transition: all 1s ease-in-out;
        }
        .container:hover::before {
           mask: conic-gradient(black 360deg, transparent 0deg);
    -webkit-mask: conic-gradient(black 360deg, transparent 0deg);
        }

        .circle {
            position: absolute;
            width: 150px;
            height: 150px;
            background-color: white;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="circle"></div>
    </div>
</body>
</html>
